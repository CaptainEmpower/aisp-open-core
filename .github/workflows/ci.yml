name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pin a portable CPU baseline so cached artifacts (proc-macro dylibs in
  # particular) work across heterogeneous runners; a host-specific
  # target-cpu from any cargo config would otherwise poison the cache and
  # SIGILL on the next runner. Env RUSTFLAGS takes precedence over
  # config-file rustflags.
  RUSTFLAGS: -C target-cpu=x86-64

# Every job below is strict (exits non-zero on failure, job goes red, no
# advisory/exit-0 masking) EXCEPT `integration-tests`, which stays advisory
# until the proof/SMT engine lands (issues #11/#12/#18, ROADMAP R-05/R-13); it
# is flipped strict in a final PR once that work is done. A green check on a
# strict job means it genuinely passed; mark the strict jobs as required in
# branch protection to block merges on failure.
jobs:
  # Z3 proving is part of the default build (maintainer decision, see ROADMAP R-02),
  # so every Rust job provisions system Z3.
  build:
    name: Build (workspace, Z3 enabled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-targets

  all-features-check:
    name: Build (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace (all features)
        run: cargo check --workspace --all-targets --all-features

  unit-tests:
    name: Unit tests (lib targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run lib unit tests
        run: cargo test --workspace --lib

  integration-tests:
    name: Integration tests (advisory until R-05/R-13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Advisory: several integration suites have known pre-existing failures
      # because formal verification is still stubbed (see issues #11, #12, #18
      # and ROADMAP R-05/R-13). Reports a warning instead of failing so this
      # check does not block merges. Flip to a plain strict `cargo test` once
      # #11/#12 (the proof/SMT engine) land — see the final-PR plan tracked in
      # those issues.
      # --test-threads=1: aisp-core enables Z3 by default and Z3 tests can
      # contend when run in parallel (see .cargo/config.toml aliases and the
      # crate metadata).
      - name: Run all tests (no fail fast, advisory)
        run: |
          if cargo test --workspace --no-fail-fast -- --test-threads=1; then
            echo "✅ Full test suite passed — R-05/R-13 may be done; make this job strict." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Integration tests (advisory)::Known pre-existing failures while formal verification is stubbed (issues #11/#12/#18, ROADMAP R-05/R-13). This job does not block merges until those land."
            echo "⚠️ Integration suites have known pre-existing failures while formal verification is stubbed (issues #11/#12/#18, ROADMAP R-05/R-13). Advisory only — see the log above for the failing targets." >> "$GITHUB_STEP_SUMMARY"
          fi

  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      # --all-features so feature-gated code (e.g. property-testing, security) is
      # linted too — matching the canonical `clippy-all` alias.
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  npm-validator:
    name: npm validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/validator
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
