name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pin a portable CPU baseline so cached artifacts (proc-macro dylibs in
  # particular) work across heterogeneous runners; a host-specific
  # target-cpu from any cargo config would otherwise poison the cache and
  # SIGILL on the next runner. Env RUSTFLAGS takes precedence over
  # config-file rustflags.
  RUSTFLAGS: -C target-cpu=x86-64

jobs:
  # Z3 proving is part of the default build (maintainer decision, see ROADMAP R-02),
  # so every Rust job provisions system Z3.
  build:
    name: Build (workspace, Z3 enabled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-targets

  # Advisory job: compiles the workspace with every feature enabled so
  # feature-gated code (e.g. the property-testing test suite) cannot bit-rot
  # invisibly. Flip to strict once it is green on all open branches.
  all-features-check:
    name: Build all-features (advisory until R-13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace (all features, advisory)
        run: |
          if cargo check --workspace --all-targets --all-features; then
            echo "✅ All-features check passed — consider making this job strict (R-13)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=All-features check (advisory)::Feature-gated code fails to compile (ROADMAP R-13). Advisory until the fix lands on this branch."
            echo "⚠️ Feature-gated code fails to compile under --all-features (ROADMAP R-13). Advisory only." >> "$GITHUB_STEP_SUMMARY"
          fi

  unit-tests:
    name: Unit tests (lib targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run lib unit tests
        run: cargo test --workspace --lib

  # Advisory job: several integration suites have known pre-existing failures
  # (see ROADMAP R-05/R-13). Reports a warning instead of failing; flip to a
  # plain `cargo test` (strict) once R-05/R-13 land.
  integration-tests:
    name: Integration tests (advisory until R-05/R-13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run all tests (no fail fast, advisory)
        run: |
          if cargo test --workspace --no-fail-fast; then
            echo "✅ Full test suite passed — R-05/R-13 may be done; make this job strict." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Integration tests (advisory)::Known pre-existing failures (ROADMAP R-05/R-13). This job does not block merges until those items land."
            echo "⚠️ Integration suites have known pre-existing failures (ROADMAP R-05/R-13). Advisory only — see the log above for the failing targets." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Advisory job: ~337 existing warnings plus rustfmt drift; ratchet down before
  # making this strict (ROADMAP R-12).
  lint:
    name: Lint (advisory until R-12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt (advisory)
        run: |
          if cargo fmt --all -- --check; then
            echo "✅ rustfmt clean." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=rustfmt (advisory)::Formatting drift present (ROADMAP R-12). Advisory until the cleanup lands."
            echo "⚠️ rustfmt reports formatting drift (ROADMAP R-12). Advisory only." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: clippy (advisory)
        run: |
          if cargo clippy --workspace --all-targets -- -D warnings; then
            echo "✅ clippy clean." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=clippy (advisory)::Existing warnings (ROADMAP R-12). Advisory until the warning ratchet lands."
            echo "⚠️ clippy reports existing warnings (ROADMAP R-12). Advisory only." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Advisory until the npm harness fix (ROADMAP R-03) merges; flip to strict after.
  npm-validator:
    name: npm validator (advisory until R-03)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/validator
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run tests (advisory)
        run: |
          if npm test; then
            echo "✅ npm validator tests passed — R-03 is in; make this job strict." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=npm validator (advisory)::Test harness broken on this branch (ROADMAP R-03). Advisory until the fix merges."
            echo "⚠️ npm validator harness fails (ROADMAP R-03). Advisory only." >> "$GITHUB_STEP_SUMMARY"
          fi
