name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pin a portable CPU baseline so cached artifacts (proc-macro dylibs in
  # particular) work across heterogeneous runners; a host-specific
  # target-cpu from any cargo config would otherwise poison the cache and
  # SIGILL on the next runner. Env RUSTFLAGS takes precedence over
  # config-file rustflags.
  RUSTFLAGS: -C target-cpu=x86-64

# Every job below is strict: it exits non-zero on failure, the job goes red, and
# there is no advisory/exit-0 masking — a green check means it genuinely passed.
# NOTE: `integration-tests` is expected to stay red until formal verification
# lands (issues #11/#12/#18, ROADMAP R-05/R-13). Mark these jobs as required in
# branch protection to block merges on failure.
jobs:
  # Z3 proving is part of the default build (maintainer decision, see ROADMAP R-02),
  # so every Rust job provisions system Z3.
  build:
    name: Build (workspace, Z3 enabled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --all-targets

  all-features-check:
    name: Build (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace (all features)
        run: cargo check --workspace --all-targets --all-features

  unit-tests:
    name: Unit tests (lib targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run lib unit tests
        run: cargo test --workspace --lib

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Strict: the job exits non-zero if any test fails. NOTE: several formal
      # -verification / spec-validation suites currently fail because formal
      # verification is still stubbed (issues #11/#12/#18, ROADMAP R-05/R-13),
      # so this check will stay red until that work lands.
      # --no-fail-fast so every failing target is reported in one run.
      # --test-threads=1: aisp-core enables Z3 by default and Z3 tests can
      # contend when run in parallel (see .cargo/config.toml aliases and the
      # crate metadata), which would make this strict job nondeterministic.
      - name: Run all tests
        run: cargo test --workspace --no-fail-fast -- --test-threads=1

  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      # --all-features so feature-gated code (e.g. property-testing, security) is
      # linted too — matching the canonical `clippy-all` alias.
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  npm-validator:
    name: npm validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/validator
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
